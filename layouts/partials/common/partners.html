{{- $page := site.GetPage (.page | default "/kuma-partners") -}}

{{- with $page }}
  {{- with .Params.items }}
    <div class="logos-container">
      {{- range . }}
        <img
          class="logo"
          src="{{ .logo | relURL }}"
          alt="{{ .name }}"
        />
      {{- end }}
    </div>
  {{- end }}
{{- end }}
